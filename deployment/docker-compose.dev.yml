services:
  task-analytics:
    build:
      context: ..
      target: deps
    command: npm run start:dev
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: "3003"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/taskflow
      RABBITMQ_URL: amqp://rabbitmq:5672
      CORS_ORIGIN: "*"
    volumes:
      - ..:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - taskflow-net

networks:
  taskflow-net:
    external: true
    