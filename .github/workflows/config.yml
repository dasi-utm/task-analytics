apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-analytics
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-analytics
  template:
    metadata:
      labels:
        app: task-analytics
    spec:
      containers:
        - name: task-analytics
          image: europe-west1-docker.pkg.dev/project-e9cd02a6-ea1c-4a7f-b14/services-repo/task-analytics:initial
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: task-analytics-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: task-analytics
  namespace: services
spec:
  type: ClusterIP
  selector:
    app: task-analytics
  ports:
    - port: 80
      targetPort: 3003
    