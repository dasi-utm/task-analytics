name: Build and Deploy Task Analytics API

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: europe-west1
  GAR_REPOSITORY: services-repo
  IMAGE_NAME: task-analytics
  NODE_VERSION: '18'

jobs:
  # ============================================
  # CI STAGES
  # ============================================

  # 1. BUILD APPLICATION
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build || echo "No build script found"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./dist/
          retention-days: 1

  # 2. UNIT TESTS
  unit-tests:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test || echo "No tests found"
        continue-on-error: false

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7

  # 3. CODE VALIDATION (Lint & Format)
  code-validation:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "No lint script found"
        continue-on-error: false

      - name: Check formatting
        run: npx prettier --check "src/**/*.js" || echo "No prettier config found"

  # 4. INTEGRATION TESTS (with RabbitMQ & PostgreSQL)
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, code-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start test dependencies
        run: |
          docker network create test-network || true
          docker run -d --name rabbitmq-test --network test-network -p 5672:5672 rabbitmq:3.13-management
          docker run -d --name postgres-test --network test-network -p 5432:5432 \
            -e POSTGRES_DB=analytics_test \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_PASSWORD=testpass \
            postgres:15
          sleep 15

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration || echo "No integration tests found"
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: analytics_test
          NODE_ENV: test

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./test-results/
          retention-days: 7

      - name: Cleanup test containers
        if: always()
        run: |
          docker stop rabbitmq-test postgres-test || true
          docker rm rabbitmq-test postgres-test || true
          docker network rm test-network || true

  # 5. SECURITY SCAN
  security-scan:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --production || echo "Vulnerabilities found"

      - name: Run Snyk security scan (optional)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ============================================
  # CD STAGES (Only on main branch)
  # ============================================

  # 6. BUILD AND PUSH DOCKER IMAGE
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-validation, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 416.0.0'
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev --quiet

      - name: Set image tags
        run: |
          echo "IMAGE_URI_SHA=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_URI_LATEST=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:latest" >> $GITHUB_ENV
          echo "IMAGE_URI_DEV=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:dev" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_URI_SHA }}
            ${{ env.IMAGE_URI_LATEST }}
            ${{ env.IMAGE_URI_DEV }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=$(date -Iseconds)

      - name: Log image info
        run: |
          echo "✅ Image built and pushed:"
          echo "  - SHA version: $IMAGE_URI_SHA"
          echo "  - Latest version: $IMAGE_URI_LATEST"
          echo "  - Dev version: $IMAGE_URI_DEV"

  # 7. DEPLOY TO GKE
  deploy-to-gke:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 416.0.0'
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          # Update deployment with new image
          kubectl set image deployment/task-analytics task-analytics=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest -n services
          
          # Wait for rollout
          kubectl rollout status deployment/task-analytics -n services --timeout=300s

      - name: Verify deployment
        run: |
          echo "✅ Deployment completed"
          kubectl get pods -n services | grep task-analytics
          kubectl logs -l app=task-analytics -n services --tail=20

  # 8. VERIFY DEPLOYMENT
  verify-deployment:
    runs-on: ubuntu-latest
    needs: deploy-to-gke
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Check deployment status
        run: |
          echo "=========================================="
          echo "✅ CI/CD PIPELINE COMPLETED"
          echo "=========================================="
          echo "📦 Image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🔧 Commit: ${{ github.sha }}"
          echo "🚀 Deployment: task-analytics"
          echo "=========================================="
          echo ""
          echo "📋 Pipeline logs available at:"
          echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Show kubectl commands for verification
        run: |
          echo ""
          echo "To verify deployment, run:"
          echo "  kubectl get pods -n services | grep task-analytics"
          echo "  kubectl logs -l app=task-analytics -n services --tail=20"